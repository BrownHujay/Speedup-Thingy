run_name: small
output_dir: runs
model:
  topology: recursive
  vocab_size: 512
  d_model: 32
  n_heads: 4
  d_ff: 128
  n_dense_layers: 7
  n_prelude: 1
  n_coda: 1
  t_max: 64
  depth_choices: [1, 2, 4, 8, 16, 32, 64]
  attn_banks: 2
  ffn_banks: 1
  head_groups: 4
  ffn_groups: 16
  active_head_groups: 2
  active_ffn_groups: 2
  recipe_count: 8
  tie_embeddings: true
  use_rope: true
  use_recursive_input_skip: true
  fairness_tolerance: 0.01
  macro_rank: 8
  router_hidden: 32
training:
  mode: recursive_macro_shortlist
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.05
  batch_size: 4
  seq_len: 32
  grad_accum_steps: 1
  seed: 1337
  precision: bf16
  compile_model: true
  compile_mode: reduce-overhead
  fused_optimizer: true
  foreach_optimizer: true
  allow_tf32: true
  strict_cuda: true
  require_triton: false
  require_flash_attention: true
  audit_p_min: 0.05
  audit_p_max: 0.25
output:
  mode: shortlist
  num_clusters: 32
  shortlist_top_clusters: 2
  shortlist_max_tokens: 64
  hard_negatives: 16
  random_negatives: 16
data:
  dataset: tinystories
  tokenizer: gpt2_bpe
  max_tokens: 200000
  eval_tokens: 20000
