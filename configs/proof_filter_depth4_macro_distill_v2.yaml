run_name: proof_filter_depth4_macro_distill_v2
output_dir: runs
model:
  topology: recursive
  vocab_size: 2048
  d_model: 64
  n_heads: 8
  d_ff: 256
  n_dense_layers: 11
  n_prelude: 1
  n_coda: 1
  t_max: 4
  depth_choices: [1, 2, 4]
  attn_banks: 1
  ffn_banks: 2
  head_groups: 8
  ffn_groups: 16
  active_head_groups: 2
  active_ffn_groups: 2
  recipe_count: 16
  tie_embeddings: true
  use_rope: true
  use_recursive_input_skip: true
  fairness_tolerance: 0.01
  macro_type: v2_delta_radius
  macro_rank: 64
  macro_hidden_mult: 4
  macro_radius_init_from_teacher: true
  macro_radius_clamp_mult_min: 0.25
  macro_radius_clamp_mult_max: 4.0
  macro_use_depth_embedding: true
  macro_use_recipe_embedding: true
  macro_use_delta_to_h0: true
  macro_decomposition: direct
  router_hidden: 64
training:
  mode: recursive_macro_distill_only
  optimizer: adamw
  lr: 0.001
  lr_base: 0.001
  lr_macro: 0.003
  lr_coda: 0.0003
  lr_output: 0.0003
  lr_router: 0.0
  weight_decay: 0.1
  batch_size: 128
  seq_len: 64
  grad_accum_steps: 1
  grad_clip_norm: 1.0
  seed: 1234
  precision: fp32
  audit_p_min: 0.0
  audit_p_max: 0.0
  audit_alpha: 0.0
  audit_beta: 0.0
  audit_gamma: 0.0
  audit_mode: distill_only
  audit_gradient_correction: false
  lambda_hidden_mse: 0.0
  lambda_hidden_cosine: 0.0
  lambda_logit_kl: 0.25
  lambda_norm: 0.0
  lambda_delta_dir: 2.0
  lambda_delta_rms: 2.0
  lambda_endpoint_normed: 1.0
  lambda_endpoint_raw: 0.05
  macro_rms_trust_region: true
  lambda_macro_rms_trust: 2.0
  lambda_cons: 0.001
  distill_temperature: 2.0
  fixed_recipe: 1
  fixed_depth: 4
  disable_router_aux: true
  debug_force_full_output: true
  coverage_min: 0.0
  log_every: 10
  compile_model: false
  fused_optimizer: false
  foreach_optimizer: false
  allow_tf32: true
  strict_cuda: false
  require_triton: false
  require_flash_attention: false
output:
  mode: full
data:
  dataset: tinystories
  tokenizer: gpt2_bpe
  vocab_projection: filter
  projection_lane: filter
  train_tokens: 6000000
  eval_tokens: 65536
  seed: 1234
