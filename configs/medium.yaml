run_name: medium
output_dir: runs
model:
  topology: recursive
  vocab_size: 2048
  d_model: 64
  n_heads: 8
  d_ff: 256
  n_dense_layers: 11
  n_prelude: 1
  n_coda: 1
  t_max: 64
  depth_choices: [1, 2, 4, 8, 16, 32, 64]
  attn_banks: 1
  ffn_banks: 2
  head_groups: 8
  ffn_groups: 16
  active_head_groups: 2
  active_ffn_groups: 2
  recipe_count: 16
  tie_embeddings: true
  use_rope: true
  use_recursive_input_skip: true
  fairness_tolerance: 0.01
  macro_rank: 16
  router_hidden: 64
training:
  mode: recursive_macro_shortlist
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.1
  batch_size: 8
  seq_len: 64
  grad_accum_steps: 1
  seed: 1337
  precision: bf16
  compile_model: true
  compile_mode: reduce-overhead
  fused_optimizer: true
  foreach_optimizer: true
  allow_tf32: true
  strict_cuda: true
  require_triton: false
  require_flash_attention: true
  audit_p_min: 0.03
  audit_p_max: 0.25
output:
  mode: shortlist
  num_clusters: 128
  shortlist_top_clusters: 2
  shortlist_max_tokens: 128
  hard_negatives: 32
  random_negatives: 32
data:
  dataset: tinystories
  tokenizer: gpt2_bpe
  max_tokens: 1000000
  eval_tokens: 50000
